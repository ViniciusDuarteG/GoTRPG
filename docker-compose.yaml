services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 8003
      GOTRPG_SECRET_KEY: ${GOTRPG_SECRET_KEY:-}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-*}
      DATA_DIR: /data
    volumes:
      - gotrpg_data:/data

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:50"
    depends_on:
      - backend

volumes:
  gotrpg_data:
