services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 8003
      GOTRPG_SECRET_KEY: '${GOTRPG_SECRET_KEY:-}'
      ALLOWED_ORIGIN: '${ALLOWED_ORIGIN:-*}'
      DATA_DIR: /data
    volumes:
      - gotrpg_data:/data
    expose:
      - "8003"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8003
    ports:
      - "8081:80"
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  gotrpg_data:
